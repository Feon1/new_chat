<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Админ-панель XiaoZhi</title>
    <style>
        /* ----- Базовые переменные ----- */
        :root {
            --bg: #0e0e12;
            --surface: #1a1a22;
            --surface2: #252530;
            --text: #e8e8f0;
            --text-dim: #8888a0;
            --accent: #6c5ce7;
            --accent-hover: #7d6ff0;
            --danger: #e74c6f;
            --danger-hover: #f05a7a;
            --success: #2ecc71;
            --border: #2d2d3a;
            --radius: 12px;
            --shadow: 0 4px 24px rgba(0,0,0,0.4);
            --transition: 0.2s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 16px;
        }

        /* ----- Авторизация ----- */
        .login-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(4px);
        }
        .login-box {
            background: var(--surface);
            padding: 32px 28px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 400px;
            border: 1px solid var(--border);
        }
        .login-box h2 {
            font-weight: 600;
            font-size: 22px;
            margin-bottom: 8px;
            text-align: center;
        }
        .login-box p {
            color: var(--text-dim);
            text-align: center;
            margin-bottom: 24px;
            font-size: 14px;
        }
        .login-input {
            width: 100%;
            padding: 14px 16px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 16px;
            outline: none;
            transition: border var(--transition);
        }
        .login-input:focus { border-color: var(--accent); }
        .login-btn {
            width: 100%;
            padding: 14px;
            background: var(--accent);
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background var(--transition);
            margin-top: 12px;
        }
        .login-btn:hover { background: var(--accent-hover); }
        .login-error {
            color: var(--danger);
            font-size: 14px;
            margin-top: 12px;
            text-align: center;
            display: none;
        }

        /* ----- Основная панель ----- */
        .app-container {
            max-width: 1400px;
            margin: 0 auto;
            display: none;
        }

        /* Шапка */
        .header {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 16px 20px;
            background: var(--surface);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            margin-bottom: 16px;
        }
        .header h1 {
            font-size: 22px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .header h1 span { color: var(--accent); }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .logout-btn {
            padding: 8px 16px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            cursor: pointer;
            font-size: 14px;
            transition: all var(--transition);
        }
        .logout-btn:hover {
            background: var(--danger);
            border-color: var(--danger);
            color: #fff;
        }

        .stats {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .stat-box {
            background: var(--surface2);
            padding: 8px 16px;
            border-radius: 8px;
            text-align: center;
            min-width: 80px;
        }
        .stat-box .number {
            font-size: 20px;
            font-weight: 700;
            color: var(--accent);
        }
        .stat-box .label {
            font-size: 11px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Вкладки */
        .tabs {
            display: flex;
            gap: 6px;
            margin-bottom: 16px;
            overflow-x: auto;
            padding: 0 2px 4px;
        }
        .tab {
            padding: 10px 20px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-dim);
            cursor: pointer;
            font-weight: 500;
            font-size: 14px;
            white-space: nowrap;
            transition: all var(--transition);
            flex: 0 0 auto;
        }
        .tab:hover { border-color: var(--accent); color: var(--text); }
        .tab.active {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
        }

        /* Панели */
        .dashboard {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 16px;
            height: calc(100vh - 220px);
            min-height: 400px;
        }
        .panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }
        .panel-header h3 {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-dim);
        }
        .panel-header button {
            background: none;
            border: none;
            color: var(--text-dim);
            cursor: pointer;
            font-size: 18px;
            padding: 4px 8px;
            border-radius: 6px;
            transition: background var(--transition);
        }
        .panel-header button:hover { background: var(--surface2); }

        .panel-body {
            flex: 1;
            overflow-y: auto;
            padding: 8px 12px;
        }

        /* Список пользователей */
        .user-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: background var(--transition);
            border-bottom: 1px solid var(--border);
        }
        .user-item:hover { background: var(--surface2); }
        .user-item.active { background: var(--surface2); border-left: 3px solid var(--accent); }
        .user-id {
            font-weight: 500;
            font-size: 14px;
            word-break: break-word;
        }
        .user-meta {
            font-size: 12px;
            color: var(--text-dim);
            text-align: right;
            white-space: nowrap;
            margin-left: 8px;
        }
        .user-meta .count { color: var(--accent); font-weight: 600; }

        /* Чат */
        .chat-view {
            flex: 1;
            overflow-y: auto;
            padding: 12px 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .message {
            max-width: 85%;
            padding: 10px 14px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.5;
            word-wrap: break-word;
            background: var(--surface2);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }
        .message.user {
            background: var(--accent);
            align-self: flex-end;
            border-bottom-right-radius: 4px;
            color: #fff;
        }
        .message-time {
            font-size: 10px;
            color: var(--text-dim);
            margin-top: 4px;
            text-align: right;
        }
        .message.user .message-time { color: rgba(255,255,255,0.7); }
        .empty-state {
            color: var(--text-dim);
            text-align: center;
            padding: 40px 20px;
            font-size: 14px;
        }
        .loading {
            color: var(--text-dim);
            text-align: center;
            padding: 20px;
            font-size: 14px;
        }

        /* База знаний */
        .knowledge-dashboard {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 16px;
            height: calc(100vh - 220px);
            min-height: 400px;
        }
        .knowledge-list .knowledge-item {
            padding: 10px 12px;
            border-bottom: 1px solid var(--border);
            font-size: 13px;
            line-height: 1.4;
        }
        .knowledge-item .source {
            font-size: 11px;
            color: var(--text-dim);
            display: block;
            margin-top: 4px;
        }
        .knowledge-item .delete-kb {
            float: right;
            background: none;
            border: none;
            color: var(--danger);
            cursor: pointer;
            font-size: 16px;
            padding: 0 6px;
        }
        .knowledge-item .delete-kb:hover { color: var(--danger-hover); }

        .upload-zone {
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding: 16px;
        }
        .file-input-wrapper {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .file-input-wrapper input[type="file"] {
            flex: 1;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 8px;
            color: var(--text);
            font-size: 13px;
            min-width: 150px;
        }
        .upload-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 18px;
            background: var(--accent);
            border: none;
            border-radius: 8px;
            color: #fff;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: background var(--transition);
        }
        .upload-btn:hover { background: var(--accent-hover); }
        .upload-btn:disabled { opacity: 0.5; pointer-events: none; }

        /* Всплывающие уведомления */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 12px 24px;
            border-radius: 8px;
            box-shadow: var(--shadow);
            color: var(--text);
            font-size: 14px;
            z-index: 999;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            max-width: 90%;
        }
        .toast.show { opacity: 1; }
        .toast.error { border-color: var(--danger); }
        .toast.success { border-color: var(--success); }

        /* ----- Мобильная адаптация ----- */
        @media (max-width: 768px) {
            body { padding: 10px; }
            .dashboard, .knowledge-dashboard {
                grid-template-columns: 1fr;
                height: auto;
                gap: 10px;
            }
            .panel {
                height: auto;
                max-height: 60vh;
                min-height: 300px;
            }
            .user-list, .chat-view {
                max-height: 40vh;
                overflow-y: auto;
            }
            .header {
                flex-direction: column;
                align-items: stretch;
                gap: 10px;
                padding: 12px;
            }
            .header h1 { font-size: 18px; text-align: center; }
            .stats { justify-content: center; }
            .stat-box { flex: 1 1 40%; min-width: 70px; }
            .stat-box .number { font-size: 16px; }
            .stat-box .label { font-size: 10px; }
            .tabs { flex-wrap: nowrap; overflow-x: auto; gap: 4px; padding: 0 4px 4px; }
            .tab { padding: 8px 14px; font-size: 13px; flex: 1; text-align: center; }
            .message { font-size: 14px; padding: 8px 12px; max-width: 90%; }
            .message-time { font-size: 10px; }
            .user-item { padding: 8px 10px; }
            .user-id { font-size: 13px; }
            .user-meta { font-size: 11px; }
            .logout-btn { padding: 6px 12px; font-size: 13px; }
            .login-box { padding: 24px 18px; width: 95%; }
            .login-box h2 { font-size: 20px; }
            .login-input { padding: 12px; font-size: 15px; }
            .upload-zone { flex-direction: column; gap: 8px; padding: 12px; }
            .file-input-wrapper { flex-direction: column; }
            .file-input-wrapper input[type="file"] { width: 100%; }
            .upload-btn { width: 100%; justify-content: center; }
            .panel-header button { font-size: 16px; }
            .toast { bottom: 16px; font-size: 13px; padding: 10px 18px; }
        }

        @media (max-width: 480px) {
            .panel { max-height: 70vh; min-height: 250px; }
            .user-list, .chat-view { max-height: 35vh; }
            .message { font-size: 13px; padding: 6px 10px; max-width: 95%; }
            .stat-box { flex: 1 1 30%; padding: 6px 8px; }
            .stat-box .number { font-size: 14px; }
            .header h1 { font-size: 16px; }
            .tab { font-size: 12px; padding: 6px 10px; }
        }
    </style>
</head>
<body>

<!-- Модальное окно входа -->
<div class="login-overlay" id="loginOverlay">
    <div class="login-box">
        <h2>🔐 Админ-панель</h2>
        <p>Введите токен администратора для доступа</p>
        <input type="password" class="login-input" id="loginInput" placeholder="Токен администратора" autofocus>
        <button class="login-btn" id="loginBtn">Войти</button>
        <div class="login-error" id="loginError">Неверный токен</div>
    </div>
</div>

<!-- Основное приложение -->
<div class="app-container" id="appContainer">

    <!-- Шапка -->
    <header class="header">
        <h1>Xiao<span>Zhi</span> <span style="font-size:14px; color:var(--text-dim); font-weight:400;">Админ</span></h1>
        <div class="header-actions">
            <div class="stats" id="stats">
                <div class="stat-box"><span class="number" id="usersCount">0</span><span class="label">Пользователи</span></div>
                <div class="stat-box"><span class="number" id="knowledgeCount">0</span><span class="label">Знаний</span></div>
                <div class="stat-box"><span class="number" id="filesCount">0</span><span class="label">Файлов</span></div>
            </div>
            <button class="logout-btn" id="logoutBtn">Выйти</button>
        </div>
    </header>

    <!-- Вкладки -->
    <div class="tabs">
        <button class="tab active" data-tab="chat">💬 Чаты</button>
        <button class="tab" data-tab="knowledge">📚 База знаний</button>
    </div>

    <!-- Контент -->
    <div id="tabContent">
        <!-- Вкладка Чаты -->
        <div class="dashboard" id="chatTab">
            <div class="panel">
                <div class="panel-header">
                    <h3>👥 Пользователи</h3>
                    <button id="refreshUsersBtn" title="Обновить">🔄</button>
                </div>
                <div class="panel-body user-list" id="userList">
                    <div class="loading">Загрузка...</div>
                </div>
            </div>
            <div class="panel">
                <div class="panel-header">
                    <h3 id="chatHeaderTitle">💬 Выберите пользователя</h3>
                    <button id="deleteChatBtn" style="display:none; color:var(--danger);" title="Удалить историю">🗑️</button>
                </div>
                <div class="panel-body chat-view" id="chatView">
                    <div class="empty-state">Выберите пользователя из списка слева</div>
                </div>
            </div>
        </div>

        <!-- Вкладка База знаний -->
        <div class="knowledge-dashboard" id="knowledgeTab" style="display:none;">
            <div class="panel knowledge-list">
                <div class="panel-header">
                    <h3>📄 Все знания</h3>
                    <button id="refreshKnowledgeBtn" title="Обновить">🔄</button>
                </div>
                <div class="panel-body" id="knowledgeList">
                    <div class="loading">Загрузка...</div>
                </div>
            </div>
            <div class="panel">
                <div class="panel-header">
                    <h3>📤 Загрузить файл</h3>
                </div>
                <div class="panel-body upload-zone">
                    <p style="color:var(--text-dim); font-size:13px;">Поддерживаются .pdf, .docx</p>
                    <div class="file-input-wrapper">
                        <input type="file" id="fileInput" accept=".pdf,.docx">
                        <button class="upload-btn" id="uploadBtn">⬆ Загрузить</button>
                    </div>
                    <div id="uploadStatus" style="font-size:13px; color:var(--text-dim);"></div>
                    <hr style="border-color:var(--border); margin:12px 0;">
                    <button class="upload-btn" id="addKnowledgeBtn" style="background: var(--surface2); color: var(--text);">➕ Добавить вручную</button>
                    <div id="manualInput" style="display:none; margin-top:8px;">
                        <textarea id="manualText" rows="3" style="width:100%; padding:10px; background:var(--surface2); border:1px solid var(--border); border-radius:8px; color:var(--text); font-size:14px; resize:vertical;" placeholder="Введите текст знания..."></textarea>
                        <button class="upload-btn" id="saveManualBtn" style="margin-top:8px; width:100%;">Сохранить знание</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

</div>

<!-- Уведомление -->
<div class="toast" id="toast"></div>

<script>
    // ===== Конфигурация =====
    const API_BASE = window.location.origin; // например, https://docker-new-chat.onrender.com
    let adminToken = localStorage.getItem('adminToken') || '';
    let currentUserId = null;

    // ===== DOM-элементы =====
    const loginOverlay = document.getElementById('loginOverlay');
    const loginInput = document.getElementById('loginInput');
    const loginBtn = document.getElementById('loginBtn');
    const loginError = document.getElementById('loginError');
    const appContainer = document.getElementById('appContainer');
    const logoutBtn = document.getElementById('logoutBtn');

    const userListEl = document.getElementById('userList');
    const chatViewEl = document.getElementById('chatView');
    const chatHeaderTitle
