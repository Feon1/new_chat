<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Феон | Админ-панель</title>
    <style>
        :root {
            --bg-dark: #1a1a2e;
            --bg-card: #16213e;
            --bg-input: #0f3460;
            --accent: #667eea;
            --accent-hover: #764ba2;
            --text-main: #eaeaea;
            --text-muted: #8892b0;
            --danger: #e74c3c;
            --success: #2ecc71;
            --warning: #f39c12;
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Nunito', 'Segoe UI', sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-main); min-height: 100vh; padding: 10px; }

        /* === ЭКРАН ВХОДА === */
        .login-screen {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(26, 26, 46, 0.95); backdrop-filter: blur(10px);
            display: flex; align-items: center; justify-content: center; z-index: 1000;
        }
        .login-box {
            background: var(--bg-card); padding: 30px 25px; border-radius: 16px;
            width: 90%; max-width: 400px; box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            border: 1px solid var(--border); text-align: center;
        }
        .login-box h2 { color: var(--accent); margin-bottom: 20px; font-size: 22px; }
        .login-input {
            width: 100%; padding: 14px; background: var(--bg-input);
            border: 1px solid var(--border); border-radius: 8px;
            color: var(--text-main); font-size: 15px; margin-bottom: 15px;
        }
        .login-input:focus { outline: none; border-color: var(--accent); }
        .remember-me {
            display: flex; align-items: center; gap: 10px; margin-bottom: 20px;
            color: var(--text-muted); cursor: pointer; font-size: 14px; justify-content: center;
        }
        .remember-me input[type="checkbox"] { width: 18px; height: 18px; accent-color: var(--accent); }
        .login-btn {
            width: 100%; padding: 14px; background: linear-gradient(135deg, var(--accent), var(--accent-hover));
            color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer;
        }
        .login-btn:hover { transform: translateY(-2px); }
        .login-error { color: var(--danger); margin-top: 15px; font-size: 14px; display: none; word-break: break-word; }

        /* === ОСНОВНОЙ ИНТЕРФЕЙС === */
        .admin-container { display: none; max-width: 1400px; margin: 0 auto; padding: 10px 0; }
        .header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 15px; padding-bottom: 15px; border-bottom: 1px solid var(--border);
            flex-wrap: wrap; gap: 15px;
        }
        .header h1 { font-size: 20px; }
        .stats { display: flex; gap: 10px; flex-wrap: wrap; }
        .stat-box {
            background: var(--bg-card); padding: 8px 14px; border-radius: 10px;
            border: 1px solid var(--border); text-align: center; min-width: 70px;
        }
        .stat-box .number { font-size: 18px; font-weight: 700; color: var(--accent); }
        .stat-box .label { font-size: 10px; color: var(--text-muted); margin-top: 2px; }
        .logout-btn {
            background: rgba(231, 76, 60, 0.15); color: var(--danger);
            border: 1px solid rgba(231, 76, 60, 0.3); padding: 8px 16px;
            border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 14px;
        }
        .logout-btn:hover { background: var(--danger); color: white; }

        /* === ВКЛАДКИ === */
        .tabs {
            display: flex; gap: 8px; margin-bottom: 15px; border-bottom: 1px solid var(--border);
            overflow-x: auto; padding: 0 2px 4px;
        }
        .tab {
            padding: 10px 18px; background: transparent; border: none;
            color: var(--text-muted); cursor: pointer; font-size: 14px; font-weight: 600;
            border-bottom: 3px solid transparent; transition: all 0.2s; white-space: nowrap;
        }
        .tab:hover { color: var(--text-main); }
        .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* === ОБЩИЕ СТИЛИ ПАНЕЛЕЙ === */
        .dashboard, .knowledge-dashboard {
            display: grid; grid-template-columns: 300px 1fr; gap: 15px;
            height: calc(100vh - 210px); min-height: 400px;
        }
        .panel {
            background: var(--bg-card); border-radius: 12px; border: 1px solid var(--border);
            display: flex; flex-direction: column; overflow: hidden;
        }
        .panel-header {
            padding: 12px 16px; border-bottom: 1px solid var(--border);
            font-weight: 600; color: var(--text-muted);
            display: flex; justify-content: space-between; align-items: center; flex-shrink: 0;
            font-size: 14px;
        }
        .user-list, .knowledge-list { flex: 1; overflow-y: auto; }
        
        /* === ЭЛЕМЕНТЫ СПИСКОВ === */
        .user-item, .file-item {
            padding: 12px 16px; border-bottom: 1px solid var(--border); cursor: pointer;
            display: flex; justify-content: space-between; align-items: center;
        }
        .user-item:hover, .file-item:hover { background: rgba(102, 126, 234, 0.1); }
        .user-item.active { background: rgba(102, 126, 234, 0.2); border-left: 3px solid var(--accent); }
        .file-item.active { background: rgba(46, 204, 113, 0.2); border-left: 3px solid var(--success); }
        
        .user-id, .file-name { font-weight: 600; font-size: 13px; word-break: break-word; }
        .file-name { color: var(--success); }
        .user-meta, .file-meta { font-size: 11px; color: var(--text-muted); margin-top: 3px; }
        .delete-btn {
            background: transparent; border: none; color: var(--danger);
            cursor: pointer; font-size: 16px; opacity: 0.7; padding: 0 6px;
        }
        .delete-btn:hover { opacity: 1; }

        /* === ЗОНА ЗАГРУЗКИ ФАЙЛОВ === */
        .upload-zone {
            padding: 12px 16px; border-bottom: 1px solid var(--border);
            display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
            background: rgba(102, 126, 234, 0.05);
        }
        .file-input-wrapper {
            position: relative; overflow: hidden; display: inline-block; flex: 1;
        }
        .file-input-wrapper input[type=file] {
            font-size: 13px; color: var(--text-muted); width: 100%;
        }
        .upload-btn {
            padding: 8px 16px; background: var(--success); color: white;
            border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer;
        }
        .upload-btn:hover { background: #27ae60; }
        .upload-btn:disabled { background: var(--text-muted); cursor: not-allowed; }
        .upload-status { font-size: 13px; width: 100%; margin-top: 4px; }

        /* === ПРОСМОТР === */
        .chat-view, .knowledge-view {
            flex: 1; overflow-y: auto; padding: 15px;
            display: flex; flex-direction: column; gap: 12px;
        }
        .message {
            max-width: 85%; padding: 10px 14px; border-radius: 12px;
            font-size: 14px; line-height: 1.5; word-wrap: break-word;
        }
        .message.user {
            align-self: flex-end; background: var(--accent); color: white;
            border-bottom-right-radius: 4px;
        }
        .message.assistant {
            align-self: flex-start; background: var(--bg-input);
            border: 1px solid var(--border); border-bottom-left-radius: 4px;
        }
        .message-time {
            font-size: 10px; opacity: 0.7; margin-top: 4px; text-align: right;
        }
        
        .knowledge-text {
            background: var(--bg-input); padding: 15px; border-radius: 10px;
            border: 1px solid var(--border); font-size: 14px; line-height: 1.6;
            white-space: pre-wrap; word-break: break-word;
        }
        .knowledge-header-info {
            display: flex; gap: 12px; align-items: center; flex-wrap: wrap;
        }
        .badge {
            padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600;
        }
        .badge-file { background: rgba(46, 204, 113, 0.2); color: var(--success); }
        .badge-manual { background: rgba(243, 156, 18, 0.2); color: var(--warning); }

        .empty-state {
            flex: 1; display: flex; align-items: center; justify-content: center;
            color: var(--text-muted); font-style: italic; padding: 20px;
        }
        .loading { text-align: center; padding: 20px; color: var(--text-muted); }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-dark); }
        ::-webkit-scrollbar-thumb { background: var(--bg-input); border-radius: 4px; }

        /* === МОБИЛЬНАЯ АДАПТАЦИЯ === */
        @media (max-width: 768px) {
            .dashboard, .knowledge-dashboard {
                grid-template-columns: 1fr;
                height: auto;
                gap: 12px;
            }
            .panel {
                height: auto;
                max-height: 60vh;
                min-height: 300px;
            }
            .user-list, .chat-view, .knowledge-list, .knowledge-view {
                max-height: 40vh;
                overflow-y: auto;
            }
            .header {
                flex-direction: column;
                align-items: stretch;
                gap: 10px;
                padding-bottom: 10px;
            }
            .header h1 { font-size: 18px; text-align: center; }
            .stats { justify-content: center; }
            .stat-box { flex: 1 1 40%; min-width: 70px; padding: 6px 10px; }
            .stat-box .number { font-size: 16px; }
            .stat-box .label { font-size: 9px; }
            .tabs { flex-wrap: nowrap; overflow-x: auto; gap: 4px; padding: 0 2px 4px; }
            .tab { padding: 8px 14px; font-size: 13px; flex: 1; text-align: center; }
            .message { font-size: 14px; padding: 8px 12px; max-width: 90%; }
            .message-time { font-size: 10px; }
            .user-item { padding: 10px 12px; }
            .user-id { font-size: 13px; }
            .user-meta { font-size: 11px; }
            .logout-btn { padding: 6px 12px; font-size: 13px; }
            .login-box { padding: 24px 18px; width: 95%; }
            .login-box h2 { font-size: 20px; }
            .login-input { padding: 12px; font-size: 15px; }
            .upload-zone { flex-direction: column; gap: 8px; padding: 10px; }
            .file-input-wrapper { width: 100%; }
            .upload-btn { width: 100%; justify-content: center; }
            .panel-header { font-size: 13px; padding: 10px 14px; }
            .panel-header button { font-size: 14px; }
            .knowledge-text { font-size: 13px; padding: 12px; }
        }

        @media (max-width: 480px) {
            .panel { max-height: 70vh; min-height: 250px; }
            .user-list, .chat-view, .knowledge-list, .knowledge-view {
                max-height: 35vh;
            }
            .message { font-size: 13px; padding: 6px 10px; max-width: 95%; }
            .stat-box { flex: 1 1 30%; padding: 4px 8px; }
            .stat-box .number { font-size: 14px; }
            .header h1 { font-size: 16px; }
            .tab { font-size: 12px; padding: 6px 10px; }
            .user-id { font-size: 12px; }
            .user-meta { font-size: 10px; }
            .upload-btn { font-size: 12px; padding: 6px 12px; }
        }
    </style>
</head>
<body>

    <div id="loginScreen" class="login-screen">
        <div class="login-box">
            <h2>🔐 Вход в админ-панель</h2>
            <input type="password" id="tokenInput" class="login-input" placeholder="Введите ADMIN_TOKEN" onkeypress="if(event.key==='Enter') login()">
            <label class="remember-me">
                <input type="checkbox" id="rememberMe" checked> Запомнить меня
            </label>
            <button onclick="login()" class="login-btn">Войти</button>
            <div id="loginError" class="login-error"></div>
        </div>
    </div>

    <div id="adminPanel" class="admin-container">
        <div class="header">
            <h1>🔐 Админ-панель Феон</h1>
            <div class="stats">
                <div class="stat-box"><div class="number" id="totalUsers">0</div><div class="label">Пользователей</div></div>
                <div class="stat-box"><div class="number" id="totalMessages">0</div><div class="label">Сообщений</div></div>
                <div class="stat-box"><div class="number" id="totalKnowledge">0</div><div class="label">Фрагментов знаний</div></div>
                <div class="stat-box"><div class="number" id="totalFiles">0</div><div class="label">Файлов в БЗ</div></div>
            </div>
            <button onclick="logout()" class="logout-btn">🚪 Выйти</button>
        </div>

        <div class="tabs">
            <button class="tab active" onclick="switchTab('chats')">💬 История чатов</button>
            <button class="tab" onclick="switchTab('knowledge')">📚 База знаний</button>
        </div>

        <!-- ВКЛАДКА: ИСТОРИЯ ЧАТОВ -->
        <div id="tab-chats" class="tab-content active">
            <div class="dashboard">
                <div class="panel">
                    <div class="panel-header">
                        <span>Пользователи</span>
                        <button onclick="loadUsers()" style="background:none; border:none; color:var(--accent); cursor:pointer; font-size:18px;">🔄</button>
                    </div>
                    <div id="userList" class="user-list"><div class="loading">Загрузка...</div></div>
                </div>
                <div class="panel">
                    <div class="panel-header">
                        <span id="chatHeaderTitle">Выберите пользователя</span>
                        <button id="deleteChatBtn" onclick="deleteCurrentUser()" class="logout-btn" style="padding: 4px 10px; font-size: 12px; display: none;">🗑 Удалить чат</button>
                    </div>
                    <div id="chatView" class="chat-view">
                        <div class="empty-state">Выберите пользователя слева</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- ВКЛАДКА: БАЗА ЗНАНИЙ -->
        <div id="tab-knowledge" class="tab-content">
            <div class="knowledge-dashboard">
                <div class="panel">
                    <div class="panel-header">
                        <span>📁 Файлы</span>
                        <button onclick="loadKnowledge()" style="background:none; border:none; color:var(--accent); cursor:pointer; font-size:18px;">🔄</button>
                    </div>
                    
                    <!-- ЗОНА ЗАГРУЗКИ -->
                    <div class="upload-zone">
                        <div class="file-input-wrapper">
                            <input type="file" id="fileInput" accept=".pdf,.docx">
                        </div>
                        <button onclick="uploadFile()" id="uploadBtn" class="upload-btn">📤 Загрузить</button>
                        <div id="uploadStatus" class="upload-status"></div>
                    </div>

                    <div id="fileList" class="knowledge-list"><div class="loading">Загрузка...</div></div>
                </div>
                <div class="panel">
                    <div class="panel-header">
                        <div class="knowledge-header-info">
                            <span id="knowledgeHeaderTitle">Выберите файл или фрагмент</span>
                            <span id="knowledgeBadge"></span>
                        </div>
                        <button id="deleteFileBtn" onclick="deleteCurrentFile()" class="logout-btn" style="padding: 4px 10px; font-size: 12px; display: none;">🗑 Удалить файл</button>
                    </div>
                    <div id="knowledgeView" class="knowledge-view">
                        <div class="empty-state">Выберите файл слева или загрузите новый</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Автоматически определяет URL сервера
        const API_BASE = window.location.hostname.includes('github.io') 
            ? 'https://docker-new-chat.onrender.com' 
            : '';
            
        let adminToken = '';
        let currentUserId = null;
        let currentFile = null;
        let allKnowledge = [];

        document.addEventListener('DOMContentLoaded', () => {
            const savedToken = localStorage.getItem('feon_admin_token') || sessionStorage.getItem('feon_admin_token');
            if (savedToken) {
                adminToken = savedToken;
                showAdminPanel();
            }
        });

        async function login() {
            const token = document.getElementById('tokenInput').value.trim();
            const remember = document.getElementById('rememberMe').checked;
            const errorEl = document.getElementById('loginError');
            
            if (!token) { errorEl.textContent = '❌ Введите токен!'; errorEl.style.display = 'block'; return; }
            errorEl.style.display = 'none';
            
            try {
                const response = await fetch(`${API_BASE}/get_all_users`, { headers: { 'x-admin-token': token } });
                if (response.status === 401) { errorEl.textContent = '❌ Неверный токен!'; errorEl.style.display = 'block'; return; }
                if (!response.ok) throw new Error('Server error');
                
                adminToken = token;
                if (remember) localStorage.setItem('feon_admin_token', token);
                else sessionStorage.setItem('feon_admin_token', token);
                showAdminPanel();
            } catch (error) {
                errorEl.textContent = `❌ Ошибка: ${error.message}`;
                errorEl.style.display = 'block';
            }
        }

        function showAdminPanel() {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('adminPanel').style.display = 'block';
            loadUsers();
            loadKnowledge();
        }

        function logout() {
            if (confirm('Выйти из админ-панели?')) {
                localStorage.removeItem('feon_admin_token');
                sessionStorage.removeItem('feon_admin_token');
                location.reload();
            }
        }

        function switchTab(tabName) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById(`tab-${tabName}`).classList.add('active');
        }

        // ==================== ИСТОРИЯ ЧАТОВ ====================
        async function loadUsers() {
            const userListEl = document.getElementById('userList');
            userListEl.innerHTML = '<div class="loading">Загрузка...</div>';
            
            try {
                const response = await fetch(`${API_BASE}/get_all_users`, { headers: { 'x-admin-token': adminToken } });
                if (response.status === 401) { alert('Сессия истекла!'); logout(); return; }
                const data = await response.json();
                const users = data.users || [];
                
                document.getElementById('totalUsers').textContent = users.length;
                let totalMsgs = users.reduce((sum, u) => sum + (u.message_count || 0), 0);
