<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Феон | Админ-панель</title>
    <style>
        :root {
            --bg-dark: #1a1a2e;
            --bg-card: #16213e;
            --bg-input: #0f3460;
            --accent: #667eea;
            --accent-hover: #764ba2;
            --text-main: #eaeaea;
            --text-muted: #8892b0;
            --danger: #e74c3c;
            --success: #2ecc71;
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Nunito', 'Segoe UI', sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-main); min-height: 100vh; }

        .login-screen {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(26, 26, 46, 0.95); backdrop-filter: blur(10px);
            display: flex; align-items: center; justify-content: center; z-index: 1000;
        }
        .login-box {
            background: var(--bg-card); padding: 40px; border-radius: 16px;
            width: 90%; max-width: 400px; box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            border: 1px solid var(--border); text-align: center;
        }
        .login-box h2 { color: var(--accent); margin-bottom: 25px; font-size: 24px; }
        .login-input {
            width: 100%; padding: 14px; background: var(--bg-input);
            border: 1px solid var(--border); border-radius: 8px;
            color: var(--text-main); font-size: 15px; margin-bottom: 15px;
        }
        .login-input:focus { outline: none; border-color: var(--accent); }
        .remember-me {
            display: flex; align-items: center; gap: 10px; margin-bottom: 20px;
            color: var(--text-muted); cursor: pointer; font-size: 14px; justify-content: center;
        }
        .remember-me input[type="checkbox"] { width: 18px; height: 18px; accent-color: var(--accent); }
        .login-btn {
            width: 100%; padding: 14px; background: linear-gradient(135deg, var(--accent), var(--accent-hover));
            color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer;
        }
        .login-btn:hover { transform: translateY(-2px); }
        .login-error { color: var(--danger); margin-top: 15px; font-size: 14px; display: none; word-break: break-word; }

        .admin-container { display: none; max-width: 1200px; margin: 0 auto; padding: 20px; }
        .header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 30px; padding-bottom: 20px; border-bottom: 1px solid var(--border); flex-wrap: wrap; gap: 20px;
        }
        .stats { display: flex; gap: 20px; }
        .stat-box {
            background: var(--bg-card); padding: 15px 25px; border-radius: 12px;
            border: 1px solid var(--border); text-align: center;
        }
        .stat-box .number { font-size: 24px; font-weight: 700; color: var(--accent); }
        .stat-box .label { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
        .logout-btn {
            background: rgba(231, 76, 60, 0.15); color: var(--danger);
            border: 1px solid rgba(231, 76, 60, 0.3); padding: 10px 20px;
            border-radius: 8px; cursor: pointer; font-weight: 600;
        }
        .logout-btn:hover { background: var(--danger); color: white; }

        .dashboard { display: grid; grid-template-columns: 350px 1fr; gap: 20px; height: calc(100vh - 180px); }
        .panel {
            background: var(--bg-card); border-radius: 16px; border: 1px solid var(--border);
            display: flex; flex-direction: column; overflow: hidden;
        }
        .panel-header {
            padding: 15px 20px; border-bottom: 1px solid var(--border);
            font-weight: 600; color: var(--text-muted); display: flex; justify-content: space-between; align-items: center;
        }
        .user-list { flex: 1; overflow-y: auto; }
        .user-item {
            padding: 15px 20px; border-bottom: 1px solid var(--border); cursor: pointer;
            display: flex; justify-content: space-between; align-items: center;
        }
        .user-item:hover { background: rgba(102, 126, 234, 0.1); }
        .user-item.active { background: rgba(102, 126, 234, 0.2); border-left: 3px solid var(--accent); }
        .user-id { font-weight: 600; font-size: 14px; }
        .user-meta { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
        .delete-user-btn { background: transparent; border: none; color: var(--danger); cursor: pointer; font-size: 18px; }

        .chat-view { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .message { max-width: 80%; padding: 12px 16px; border-radius: 12px; font-size: 14px; line-height: 1.5; }
        .message.user { align-self: flex-end; background: var(--accent); color: white; border-bottom-right-radius: 4px; }
        .message.assistant { align-self: flex-start; background: var(--bg-input); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
        .message-time { font-size: 11px; opacity: 0.7; margin-top: 6px; text-align: right; }
        .empty-state { flex: 1; display: flex; align-items: center; justify-content: center; color: var(--text-muted); font-style: italic; }
        .loading { text-align: center; padding: 20px; color: var(--text-muted); }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-dark); }
        ::-webkit-scrollbar-thumb { background: var(--bg-input); border-radius: 4px; }

        @media (max-width: 768px) {
            .dashboard { grid-template-columns: 1fr; height: auto; }
            .panel { height: 50vh; }
        }
    </style>
</head>
<body>

    <div id="loginScreen" class="login-screen">
        <div class="login-box">
            <h2>🔐 Вход в админ-панель</h2>
            <input type="password" id="tokenInput" class="login-input" placeholder="Введите ADMIN_TOKEN" onkeypress="if(event.key==='Enter') login()">
            <label class="remember-me">
                <input type="checkbox" id="rememberMe" checked> Запомнить меня
            </label>
            <button onclick="login()" class="login-btn">Войти</button>
            <div id="loginError" class="login-error"></div>
        </div>
    </div>

    <div id="adminPanel" class="admin-container">
        <div class="header">
            <h1>🔐 Админ-панель</h1>
            <div class="stats">
                <div class="stat-box"><div class="number" id="totalUsers">0</div><div class="label">Пользователей</div></div>
                <div class="stat-box"><div class="number" id="totalMessages">0</div><div class="label">Сообщений</div></div>
            </div>
            <button onclick="logout()" class="logout-btn">🚪 Выйти</button>
        </div>

        <div class="dashboard">
            <div class="panel">
                <div class="panel-header">
                    <span>Пользователи</span>
                    <button onclick="loadUsers()" style="background:none; border:none; color:var(--accent); cursor:pointer; font-size:18px;">🔄</button>
                </div>
                <div id="userList" class="user-list"><div class="loading">Загрузка...</div></div>
            </div>
            <div class="panel">
                <div class="panel-header">
                    <span id="chatHeaderTitle">Выберите пользователя</span>
                    <button id="deleteChatBtn" onclick="deleteCurrentUser()" class="logout-btn" style="padding: 5px 10px; font-size: 12px; display: none;">🗑 Удалить чат</button>
                </div>
                <div id="chatView" class="chat-view">
                    <div class="empty-state">Выберите пользователя слева</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Если фронтенд и бэкенд на разных доменах, укажите здесь URL бэкенда (например, 'https://docker-new-chat.onrender.com')
        // Если на одном домене, оставьте пустую строку ''
        const API_BASE = ''; 
        
        let adminToken = '';
        let currentUserId = null;

        document.addEventListener('DOMContentLoaded', () => {
            const savedToken = localStorage.getItem('feon_admin_token') || sessionStorage.getItem('feon_admin_token');
            if (savedToken) {
                adminToken = savedToken;
                showAdminPanel();
            }
        });

        async function login() {
            const token = document.getElementById('tokenInput').value.trim();
            const remember = document.getElementById('rememberMe').checked;
            const errorEl = document.getElementById('loginError');
            
            if (!token) {
                errorEl.textContent = '❌ Введите токен!';
                errorEl.style.display = 'block';
                return;
            }
            
            errorEl.style.display = 'none';
            errorEl.textContent = 'Проверка...';
            errorEl.style.display = 'block';
            
            try {
                const response = await fetch(`${API_BASE}/get_all_users`, {
                    headers: { 'x-admin-token': token }
                });
                
                if (response.status === 401) {
                    errorEl.textContent = '❌ Неверный токен! (Проверьте ADMIN_TOKEN в .env файле сервера)';
                    return;
                }
                
                if (!response.ok) {
                    const errData = await response.json().catch(() => ({}));
                    throw new Error(errData.error || `Сервер вернул ошибку ${response.status}`);
                }
                
                adminToken = token;
                if (remember) localStorage.setItem('feon_admin_token', token);
                else sessionStorage.setItem('feon_admin_token', token);
                
                showAdminPanel();
            } catch (error) {
                console.error("Login error:", error);
                errorEl.textContent = `❌ Ошибка: ${error.message}. Убедитесь, что сервер запущен.`;
            }
        }

        function showAdminPanel() {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('adminPanel').style.display = 'block';
            loadUsers();
        }

        function logout() {
            if (confirm('Выйти из админ-панели?')) {
                localStorage.removeItem('feon_admin_token');
                sessionStorage.removeItem('feon_admin_token');
                adminToken = '';
                location.reload();
            }
        }

        async function loadUsers() {
            const userListEl = document.getElementById('userList');
            userListEl.innerHTML = '<div class="loading">Загрузка...</div>';
            
            try {
                const response = await fetch(`${API_BASE}/get_all_users`, {
                    headers: { 'x-admin-token': adminToken }
                });
                
                if (response.status === 401) { alert('Сессия истекла!'); logout(); return; }
                if (!response.ok) throw new Error(`Ошибка ${response.status}`);
                
                const data = await response.json();
                const users = data.users || [];
                
                document.getElementById('totalUsers').textContent = users.length;
                let totalMsgs = users.reduce((sum, u) => sum + (u.message_count || 0), 0);
                document.getElementById('totalMessages').textContent = totalMsgs;
                
                if (users.length === 0) {
                    userListEl.innerHTML = '<div class="empty-state">Нет пользователей</div>';
                    return;
                }
                
                userListEl.innerHTML = users.map(user => `
                    <div class="user-item ${currentUserId === user.user_id ? 'active' : ''}" onclick="selectUser('${user.user_id}')">
                        <div class="user-info" style="flex:1">
                            <div class="user-id">${escapeHtml(user.user_id)}</div>
                            <div class="user-meta">${user.message_count || 0} сообщ. • ${user.last_activity ? new Date(user.last_activity).toLocaleString('ru-RU') : 'Неактивен'}</div>
                        </div>
                        <button class="delete-user-btn" onclick="event.stopPropagation(); deleteUser('${user.user_id}')" title="Удалить">🗑</button>
                    </div>
                `).join('');
            } catch (error) {
                userListEl.innerHTML = `<div class="loading" style="color: var(--danger)">Ошибка: ${error.message}</div>`;
            }
        }

        async function selectUser(userId) {
            currentUserId = userId;
            document.getElementById('chatHeaderTitle').textContent = `Чат: ${userId}`;
            document.getElementById('deleteChatBtn').style.display = 'block';
            
            const chatViewEl = document.getElementById('chatView');
            chatViewEl.innerHTML = '<div class="loading">Загрузка истории...</div>';
            
            try {
                const response = await fetch(`${API_BASE}/get_history?user_id=${encodeURIComponent(userId)}`, {
                    headers: { 'x-admin-token': adminToken }
                });
                
                if (response.status === 401) { alert('Сессия истекла!'); logout(); return; }
                if (!response.ok) throw new Error(`Ошибка ${response.status}`);
                
                const data = await response.json();
                const messages = data.messages || [];
                
                if (messages.length === 0) {
                    chatViewEl.innerHTML = '<div class="empty-state">История пуста</div>';
                    return;
                }
                
                chatViewEl.innerHTML = messages.map(msg => `
                    <div class="message ${msg.role === 'user' ? 'user' : 'assistant'}">
                        <div>${escapeHtml(msg.content).replace(/\n/g, '<br>')}</div>
                        <div class="message-time">${msg.timestamp ? new Date(msg.timestamp).toLocaleString('ru-RU') : ''}</div>
                    </div>
                `).join('');
                chatViewEl.scrollTop = chatViewEl.scrollHeight;
            } catch (error) {
                chatViewEl.innerHTML = `<div class="loading" style="color: var(--danger)">Ошибка: ${error.message}</div>`;
            }
        }

        async function deleteUser(userId) {
            if (!confirm(`Удалить пользователя ${userId} и всю его историю?`)) return;
            
            try {
                const response = await fetch(`${API_BASE}/delete_user?user_id=${encodeURIComponent(userId)}`, {
                    method: 'DELETE',
                    headers: { 'x-admin-token': adminToken }
                });
                
                if (response.status === 401) { alert('Сессия истекла!'); logout(); return; }
                if (!response.ok) throw new Error(`Ошибка ${response.status}`);
                
                if (currentUserId === userId) {
                    currentUserId = null;
                    document.getElementById('chatHeaderTitle').textContent = 'Выберите пользователя';
                    document.getElementById('deleteChatBtn').style.display = 'none';
                    document.getElementById('chatView').innerHTML = '<div class="empty-state">Выберите пользователя слева</div>';
                }
                loadUsers();
            } catch (error) {
                alert(`Ошибка удаления: ${error.message}`);
            }
        }

        function deleteCurrentUser() {
            if (currentUserId) deleteUser(currentUserId);
        }

        function escapeHtml(text) {
            if (!text) return '';
            const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
            return text.replace(/[&<>"']/g, m => map[m]);
        }
    </script>
</body>
</html>
