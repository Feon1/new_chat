<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Чат (Мобильная версия)</title>
    <!-- Оптимизация для мобильных устройств -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <style>
        /* Сброс стандартных стилей */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh; /* Высота на 100% вьюпорта */
            box-sizing: border-box;
            overflow: hidden; /* Скрываем общий скролл body */
            position: relative; /* Для правильного позиционирования потомков */
        }

        /* Контейнер чата */
        #chatContainer {
            flex: 1; /* Занимает всё доступное пространство */
            overflow-y: auto; /* Добавляем скролл только внутри контейнера чата */
            padding: 10px;
            /* Учитываем безопасные зоны, особенно на мобильных */
            padding-left: env(safe-area-inset-left, 0);
            padding-right: env(safe-area-inset-right, 0);
            /* Оставляем место внизу для fixed-элементов */
            padding-bottom: calc(10px + env(safe-area-inset-bottom, 0) + 80px); /* 80px - примерная высота футера */
            /* Псевдоэлемент для корректного скролла к новым сообщениям */
            scroll-behavior: smooth;
        }

        /* Список сообщений */
        #messages {
            list-style-type: none;
            padding: 0;
            display: flex;
            flex-direction: column-reverse; /* Новые сообщения сверху */
        }

        #messages li {            margin-bottom: 10px;
            word-wrap: break-word;
            padding: 8px;
            border-radius: 8px;
            background-color: #e9ecef; /* Светлый фон для всех сообщений */
            max-width: 80%;
        }

        #messages li.user-message {
            align-self: flex-end; /* Сообщения пользователя справа */
            background-color: #d1ecf1;
        }

        #messages li.ai-message {
            align-self: flex-start; /* Сообщения ИИ слева */
            background-color: #f8d7da;
        }

        /* Контейнер ввода */
        #inputContainer {
            display: flex;
            gap: 5px;
            padding: 10px;
            background-color: #f0f0f0;
            position: fixed; /* Фиксируем внизу */
            bottom: 40px; /* Размещаем над футером */
            left: 0;
            right: 0;
            box-sizing: border-box;
            align-items: center;
            z-index: 100; /* Выше основного контента */
            /* Учитываем безопасные зоны */
            padding-left: env(safe-area-inset-left, 0);
            padding-right: env(safe-area-inset-right, 0);
        }

        #messageInput {
            flex: 1; /* Поле ввода занимает всё доступное место */
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        button {
            padding: 8px 12px;
            border: none;
            background-color: #007bff;
            color: white;
            cursor: pointer;
            border-radius: 4px;        }

        button:hover {
            background-color: #0056b3;
        }

        /* Футер - фиксированный внизу */
        #footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            text-align: center;
            padding: 8px 10px;
            /* Учитываем безопасные зоны */
            padding-left: env(safe-area-inset-left, 0);
            padding-right: env(safe-area-inset-right, 0);
            padding-bottom: max(env(safe-area-inset-bottom, 0), 10px); /* Минимальный отступ снизу */
            background-color: rgba(240, 240, 240, 0.95); /* Сlightly transparent bg */
            color: #666;
            font-size: 0.8em;
            z-index: 99; /* Ниже inputContainer */
            box-shadow: 0 -1px 5px rgba(0,0,0,0.1); /* Легкая тень сверху */
            border-top: 1px solid #ddd; /* Легкая граница сверху */
        }

        #footer a {
            color: #007bff;
            text-decoration: none;
        }

        #footer a:hover {
            text-decoration: underline;
        }

        /* Простая анимация для новых сообщений */
        @keyframes fadeIn {
          from { opacity: 0; transform: translateY(10px); }
          to { opacity: 1; transform: translateY(0); }
        }

        #messages li {
          animation: fadeIn 0.2s ease-out forwards;
        }

    </style>
</head>
<body>
    <div id="chatContainer">
        <ul id="messages">            <!-- Примеры сообщений -->
            <li class="ai-message">Привет! Это сообщение от ИИ.</li>
            <li class="user-message">Привет! Это сообщение от пользователя.</li>
            <li class="ai-message">Как дела?</li>
            <li class="user-message">Хорошо, спасибо!</li>
        </ul>
    </div>

    <div id="inputContainer">
        <input type="text" id="messageInput" placeholder="Введите сообщение..." />
        <button onclick="sendMessage()">Отправить</button>
    </div>

    <div id="footer">
        <a href="/privacy">Политика конфиденциальности</a> |
        <a href="/terms">Условия использования</a> |
        <span>© 2024 Чат</span>
    </div>

    <script>
        // Простой скрипт для добавления новых сообщений
        function sendMessage() {
            const inputElement = document.getElementById('messageInput');
            const messageText = inputElement.value.trim();
            if (!messageText) return;

            const messagesList = document.getElementById('messages');
            const messageItem = document.createElement('li');
            messageItem.textContent = messageText;
            messageItem.classList.add('user-message'); // Добавляем класс для стилизации
            messagesList.insertBefore(messageItem, messagesList.firstChild); // Добавляем в начало списка

            // Очищаем поле ввода
            inputElement.value = '';

            // Прокручиваем к новому сообщению (теперь это первый элемент)
            messageItem.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        // Обработка нажатия Enter в поле ввода
        document.getElementById('messageInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });

        // При загрузке прокручиваем к последнему сообщению (теперь это последний элемент из-за flex-direction: column-reverse)
        window.addEventListener('load', () => {
            const messagesList = document.getElementById('messages');
            if (messagesList.lastChild) {                 messagesList.lastChild.scrollIntoView({ behavior: 'auto', block: 'nearest' });
            }
        });

    </script>
</body>
</html>
