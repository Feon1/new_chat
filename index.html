<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Feon Chat</title>
    <!-- Добавлен viewport-fit=cover -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column; /* Располагаем элементы вертикально */
            height: 100vh; /* Высота на 100% вьюпорта */
            box-sizing: border-box; /* Учитываем padding и border в расчёте высоты */
            overflow: hidden; /* Скрываем общий скролл body */
        }

        #chatContainer {
            flex: 1; /* Занимает всё доступное пространство */
            overflow-y: auto; /* Добавляем скролл только внутри контейнера чата */
            padding: 10px;
            padding-bottom: calc(10px + env(safe-area-inset-bottom, 0)); /* Отступ снизу с учётом safe area */
            margin-bottom: 80px; /* Добавляем отступ снизу, равный высоте футера */
        }

        #messages {
            list-style-type: none;
            padding: 0;
        }

        #messages li {
            margin-bottom: 10px;
            word-wrap: break-word; /* Перенос длинных слов */
        }

        #inputContainer {
            display: flex;
            gap: 5px;
            padding: 10px;
            background-color: #f0f0f0;
            position: fixed; /* Фиксируем контейнер ввода внизу */
            bottom: 0; /* Прижимаем к низу */
            left: 0;
            right: 0;
            box-sizing: border-box;
            align-items: center; /* Выравнивание по вертикали */
            /* Учитываем безопасные зоны для нижнего края */
            padding-left: env(safe-area-inset-left, 0);            padding-right: env(safe-area-inset-right, 0);
            padding-bottom: max(env(safe-area-inset-bottom, 0), 10px); /* Минимальный отступ снизу */
        }

        #messageInput {
            flex: 1; /* Поле ввода занимает всё доступное место */
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        button {
            padding: 8px 12px;
            border: none;
            background-color: #007bff;
            color: white;
            cursor: pointer;
            border-radius: 4px;
        }

        button:hover {
            background-color: #0056b3;
        }

        /* --- Стили для футера --- */
        #footer {
            position: fixed; /* Фиксируем футер внизу экрана */
            bottom: 0; /* Прижимаем к низу */
            left: 0;
            right: 0;
            text-align: center;
            padding: 8px 10px;
            padding-top: calc(8px + env(safe-area-inset-top, 0)); /* Отступ сверху с учётом safe area, если нужно */
            /* Учитываем безопасные зоны */
            padding-left: env(safe-area-inset-left, 0);
            padding-right: env(safe-area-inset-right, 0);
            padding-bottom: max(env(safe-area-inset-bottom, 0), 10px); /* Минимальный отступ снизу */
            background-color: rgba(240, 240, 240, 0.9); /* Светло-серый фон с небольшой прозрачностью */
            backdrop-filter: blur(5px); /* Эффект размытия фона (опционально) */
            color: #666;
            font-size: 0.8em;
            z-index: 1000; /* Высокий z-index, чтобы футер был поверх других элементов */
            box-shadow: 0 -1px 5px rgba(0,0,0,0.1); /* Легкая тень сверху */
            border-top: 1px solid #ddd; /* Легкая граница сверху */
        }

        #footer a {
            color: #007bff;
            text-decoration: none;
        }
        #footer a:hover {
            text-decoration: underline;
        }

        /* --- Медиа-запрос для мобильных устройств --- */
        @media (max-width: 768px) {
            #chatContainer {
                /* Увеличиваем отступ, если футер фиксирован и имеет высоту ~80px */
                /* margin-bottom уже установлен в 80px выше, этого достаточно */
                /* padding-bottom можно увеличить, если футер НЕ фиксирован и должен просто сдвигать контент */
            }

            #inputContainer,
            #footer { /* Применяем стили к обоим нижним элементам */
                /* Убедимся, что они не выходят за границы экрана */
                width: 100%;
                max-width: 100vw;
                box-sizing: border-box;
            }
            #inputContainer {
                /* Уже fixed, высота зависит от содержимого */
            }
             /* Если футер fixed, его высоту нужно учесть в margin-bottom чата */
             /* Но если он fixed, он не влияет на нормальный поток, поэтому margin-bottom в #chatContainer решающий */
             /* Если FOOTER static/relative, тогда margin-bottom на #inputContainer или padding-bottom на body */
        }

        /* Дополнительно: Стилизация скроллбара (опционально) */
        #chatContainer::-webkit-scrollbar {
            width: 6px;
        }

        #chatContainer::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        #chatContainer::-webkit-scrollbar-thumb {
            background: #c1c1c1;
            border-radius: 3px;
        }

        #chatContainer::-webkit-scrollbar-thumb:hover {
            background: #a8a8a8;
        }

    </style>
</head>
<body>
    <div id="chatContainer">        <ul id="messages"></ul>
    </div>

    <div id="inputContainer">
        <input type="text" id="messageInput" placeholder="Введите сообщение..." />
        <button onclick="sendMessage()">Отправить</button>
    </div>

    <!-- Футер перемещён в конец body и сделан fixed -->
    <div id="footer">
        <a href="/privacy">Политика конфиденциальности</a> |
        <a href="/terms">Условия использования</a> |
        <span>© 2024 Simple Chat</span>
    </div>

    <script>
        // ... (ваш существующий JavaScript код) ...

        function addMessage(message) {
            const messagesList = document.getElementById('messages');
            const messageItem = document.createElement('li');
            messageItem.textContent = message;
            messagesList.appendChild(messageItem);

            // Прокручиваем вниз после добавления сообщения
            messagesList.scrollTop = messagesList.scrollHeight;
        }

        // ... (остальной JavaScript код) ...
    </script>
</body>
</html>
