<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feon Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Кнопка открытия чата */
        .chat-launcher {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            border: none;
            color: white;
            font-size: 28px;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(102, 126, 234, 0.5);
            transition: transform 0.3s;
            z-index: 1000;
        }

        .chat-launcher:hover {
            transform: scale(1.1);
        }

        .chat-launcher.hidden {
            display: none;
        }

        /* Виджет чата */
        .chat-widget {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 380px;
            height: 600px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            display: none;
            flex-direction: column;
            overflow: hidden;
            z-index: 1000;
        }

        .chat-widget.open {
            display: flex;
        }

        /* Overlay подключения */
        .connection-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255, 255, 255, 0.98);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            border-radius: 16px;
        }

        .connection-overlay.hidden {
            display: none;
        }

        .connection-content {
            text-align: center;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .connection-content p {
            margin: 0;
            color: #666;
            font-size: 16px;
            font-weight: 500;
        }

        .connection-content .error {
            color: #e74c3c;
        }

        /* Шапка чата */
        .chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-header .title {
            font-size: 18px;
            font-weight: 600;
        }

        .chat-header .status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            opacity: 0.9;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #4CAF50;
            box-shadow: 0 0 8px rgba(76, 175, 80, 0.8);
        }

        .status-dot.offline {
            background: #f44336;
            box-shadow: 0 0 8px rgba(244, 67, 54, 0.8);
        }

        .status-dot.connecting {
            background: #ff9800;
            box-shadow: 0 0 8px rgba(255, 152, 0, 0.8);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .close-btn {
            background: none;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
            line-height: 1;
            padding: 0 5px;
        }

        .close-btn:hover {
            opacity: 0.8;
        }

        /* Сообщения */
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f8f9fa;
        }

        .message {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
        }

        .message.user {
            align-items: flex-end;
        }

        .message.bot {
            align-items: flex-start;
        }

        .message-content {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 16px;
            font-size: 14px;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .message.user .message-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.bot .message-content {
            background: white;
            color: #333;
            border-bottom-left-radius: 4px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .message-time {
            font-size: 11px;
            color: #999;
            margin-top: 5px;
            padding: 0 5px;
        }

        /* Индикатор набора */
        .typing-indicator {
            display: none;
            padding: 15px 20px;
            background: #f8f9fa;
        }

        .typing-indicator.active {
            display: flex;
            gap: 5px;
            align-items: center;
        }

        .typing-indicator span {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #667eea;
            animation: bounce 1.4s infinite ease-in-out;
        }

        .typing-indicator span:nth-child(1) { animation-delay: 0s; }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0.6); opacity: 0.5; }
            40% { transform: scale(1); opacity: 1; }
        }

        /* Область ввода */
        .input-area {
            padding: 15px 20px;
            background: white;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }

        .input-area textarea {
            flex: 1;
            padding: 12px 15px;
            border: 1px solid #e0e0e0;
            border-radius: 20px;
            font-size: 14px;
            font-family: inherit;
            resize: none;
            max-height: 100px;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-area textarea:focus {
            border-color: #667eea;
        }

        .input-area textarea:disabled {
            background: #f5f5f5;
            cursor: not-allowed;
        }

        .input-area button {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s;
            flex-shrink: 0;
        }

        .input-area button:hover:not(:disabled) {
            transform: scale(1.1);
        }

        .input-area button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Скроллбар */
        .messages::-webkit-scrollbar {
            width: 6px;
        }

        .messages::-webkit-scrollbar-track {
            background: transparent;
        }

        .messages::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 3px;
        }

        /* Адаптивность */
        @media (max-width: 480px) {
            .chat-widget {
                width: 100%;
                height: 100%;
                bottom: 0;
                right: 0;
                border-radius: 0;
            }

            .chat-launcher {
                bottom: 20px;
                right: 20px;
            }
        }
    </style>
</head>
<body>
    <!-- Кнопка открытия чата -->
    <button id="launcherBtn" class="chat-launcher">💬</button>

    <!-- Виджет чата -->
    <div id="chatWidget" class="chat-widget">
        <!-- Overlay подключения -->
        <div id="connectionOverlay" class="connection-overlay">
            <div class="connection-content">
                <div class="spinner"></div>
                <p id="connectionStatus">Подключение к серверу...</p>
            </div>
        </div>

        <!-- Шапка -->
        <div class="chat-header">
            <div>
                <div class="title">Feon Chat</div>
                <div class="status">
                    <div id="statusDot" class="status-dot connecting"></div>
                    <span id="statusText">Проверка соединения...</span>
                </div>
            </div>
            <button id="closeChatBtn" class="close-btn">×</button>
        </div>

        <!-- Сообщения -->
        <div id="messages" class="messages"></div>

        <!-- Индикатор набора -->
        <div id="typingIndicator" class="typing-indicator">
            <span></span><span></span><span></span>
        </div>

        <!-- Область ввода -->
        <div class="input-area">
            <textarea id="messageInput" placeholder="Введите сообщение..." disabled rows="1" maxlength="1000"></textarea>
            <button id="sendButton" disabled>➤</button>
        </div>
    </div>

    <script>
    (function(){
        const chatWidget = document.getElementById('chatWidget');
        const launcherBtn = document.getElementById('launcherBtn');
        const closeChatBtn = document.getElementById('closeChatBtn');
        const messages = document.getElementById('messages');
        const messageInput = document.getElementById('messageInput');
        const sendButton = document.getElementById('sendButton');
        const typingIndicator = document.getElementById('typingIndicator');
        const connectionOverlay = document.getElementById('connectionOverlay');
        const connectionStatus = document.getElementById('connectionStatus');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');

        const API_URL = 'https://docker-new-chat.onrender.com/query';
        const HISTORY_URL = 'https://docker-new-chat.onrender.com/get_history';
        const PING_URL = 'https://docker-new-chat.onrender.com/';

        // Генерация или загрузка user_id
        let userId = localStorage.getItem('xiaozhi_user_id');
        if (!userId) {
            userId = 'user_' + Math.random().toString(36).substr(2, 9);
            localStorage.setItem('xiaozhi_user_id', userId);
        }
        console.log('User ID:', userId);

        let isConnected = false;

        // Пинг сервера
        function pingServer(callback) {
            const xhr = new XMLHttpRequest();
            xhr.open('GET', PING_URL, true);
            xhr.timeout = 5000;

            xhr.onload = function() {
                callback(this.status === 200 || this.status === 404);
            };

            xhr.onerror = function() { callback(false); };
            xhr.ontimeout = function() { callback(false); };

            try { xhr.send(); } catch(e) { callback(false); }
        }

        // Разблокировка чата
        function unlockChat() {
            isConnected = true;
            connectionOverlay.classList.add('hidden');
            messageInput.disabled = false;
            sendButton.disabled = false;
            statusDot.className = 'status-dot';
            statusText.textContent = 'Онлайн';
            messageInput.placeholder = 'Введите сообщение...';
            console.log('✅ Чат разблокирован');
            loadHistory();
        }

        // Блокировка чата
        function lockChatWithError(message) {
            isConnected = false;
            connectionStatus.textContent = message;
            connectionStatus.className = 'error';
            statusDot.className = 'status-dot offline';
            statusText.textContent = 'Нет соединения';
            messageInput.disabled = true;
            sendButton.disabled = true;
            console.log('❌ Ошибка подключения:', message);
        }

        // Попытка подключения
        function attemptConnection() {
            connectionStatus.textContent = 'Подключение к серверу...';
            connectionStatus.className = '';
            statusDot.className = 'status-dot connecting';
            statusText.textContent = 'Подключение...';

            pingServer((success) => {
                if (success) {
                    unlockChat();
                } else {
                    lockChatWithError('Не удалось подключиться. Повтор...');
                    setTimeout(attemptConnection, 3000);
                }
            });
        }

        // Открытие/закрытие чата
        function openChat() {
            chatWidget.classList.add('open');
            launcherBtn.classList.add('hidden');

            if (!isConnected) {
                attemptConnection();
            }
        }

        function closeChat() {
            chatWidget.classList.remove('open');
            launcherBtn.classList.remove('hidden');
        }

        launcherBtn.addEventListener('click', openChat);
        closeChatBtn.addEventListener('click', closeChat);

        // Загрузка истории
        async function loadHistory() {
            messages.innerHTML = '';
            try {
                const res = await fetch(`${HISTORY_URL}?user_id=${userId}`);
                const data = await res.json();

                if (data.messages && data.messages.length > 0) {
                    data.messages.forEach(msg => {
                        addMessage(msg.content, msg.role === 'user' ? 'user' : 'bot',
                            new Date(msg.timestamp).toLocaleTimeString([], {hour: '2-digit', minute: '2-digit'}));
                    });
                } else {
                    addMessage('Привет! Я ваш умный помощник. Задайте мне любой вопрос.', 'bot',
                        new Date().toLocaleTimeString([], {hour: '2-digit', minute: '2-digit'}));
                }
            } catch (e) {
                console.error('Ошибка загрузки истории', e);
            }
        }

        // Добавление сообщения в DOM
        function addMessage(text, sender, time) {
            const div = document.createElement('div');
            div.className = 'message ' + sender;

            const content = document.createElement('div');
            content.className = 'message-content';
            content.innerHTML = text.replace(/\n/g, '<br>');

            const timeSpan = document.createElement('div');
            timeSpan.className = 'message-time';
            timeSpan.textContent = time;

            div.appendChild(content);
            div.appendChild(timeSpan);
            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
        }

        // Отправка сообщения
        async function sendMessage() {
            const text = messageInput.value.trim();
            if (!text || !isConnected) return;

            addMessage(text, 'user', new Date().toLocaleTimeString([], {hour: '2-digit', minute: '2-digit'}));
            messageInput.value = '';
            messageInput.style.height = 'auto';
            sendButton.disabled = true;
            typingIndicator.classList.add('active');

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: text, user_id: userId })
                });

                const data = await response.json();

                typingIndicator.classList.remove('active');

                if (data.answer) {
                    addMessage(data.answer, 'bot', new Date().toLocaleTimeString([], {hour: '2-digit', minute: '2-digit'}));
                } else if (data.error) {
                    addMessage('Ошибка: ' + data.error, 'bot',
                        new Date().toLocaleTimeString([], {hour: '2-digit', minute: '2-digit'}));
                }
            } catch (err) {
                typingIndicator.classList.remove('active');
                addMessage('Ошибка соединения с сервером', 'bot',
                    new Date().toLocaleTimeString([], {hour: '2-digit', minute: '2-digit'}));
                console.error(err);
            } finally {
                sendButton.disabled = false;
                messageInput.focus();
            }
        }

        sendButton.addEventListener('click', sendMessage);

        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // Автоувеличение textarea
        messageInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 100) + 'px';
        });

        // Периодическая проверка соединения
        setInterval(() => {
            if (isConnected) {
                pingServer((success) => {
                    if (!success) {
                        isConnected = false;
                        connectionOverlay.classList.remove('hidden');
                        lockChatWithError('Соединение потеряно. Повторное подключение...');
                        setTimeout(attemptConnection, 2000);
                    }
                });
            }
        }, 30000);

        // Обработка потери/восстановления сети
        window.addEventListener('offline', () => {
            lockChatWithError('Нет подключения к интернету');
        });

        window.addEventListener('online', () => {
            if (!isConnected) {
                attemptConnection();
            }
        });

        // Escape для закрытия
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && chatWidget.classList.contains('open')) {
                closeChat();
            }
        });
    })();
    </script>
</body>
</html>
