<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feon Chat</title>
    <meta name="theme-color" content="#1976D2">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: url('https://raw.githubusercontent.com/Feon1/new_chat/main/sapce_background.JPG') center/cover fixed;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: 0;
        }

        /* Глобальный экран подключения */
        .global-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.6s ease, visibility 0.6s ease;
            backdrop-filter: blur(4px);
        }

        .global-overlay.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .global-content {
            text-align: center;
            color: white;
            z-index: 1;
        }

        .global-spinner {
            width: 60px; height: 60px;
            border: 5px solid rgba(255,255,255,0.2);
            border-top: 5px solid #1976D2;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 25px;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .global-content p {
            font-size: 20px;
            font-weight: 500;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
            text-shadow: 0 2px 8px rgba(0,0,0,0.5);
        }

        .global-content .success {
            color: #4CAF50;
            font-weight: bold;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
        }

        .global-content .error {
            color: #ff6b6b;
            font-size: 16px;
        }

        /* Кнопка открытия чата */
        .chat-launcher {
            position: fixed;
            bottom: 30px; right: 30px;
            width: 60px; height: 60px;
            background: #1976D2;
            border-radius: 50%;
            border: none;
            color: white;
            font-size: 28px;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(25, 118, 210, 0.4);
            transition: transform 0.3s, background 0.3s;
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .chat-launcher.visible { display: flex; }
        .chat-launcher:hover { transform: scale(1.1); background: #1565C0; }

        /* Виджет чата */
        .chat-widget {
            position: fixed;
            bottom: 100px; right: 30px;
            width: 380px; height: 550px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            display: none;
            flex-direction: column;
            overflow: hidden;
            z-index: 1000;
        }

        .chat-widget.open { display: flex; }

        /* Шапка чата */
        .chat-header {
            background: #1976D2;
            color: white; padding: 16px 20px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .chat-header .title { font-size: 18px; font-weight: 600; }
        .chat-header .status { display: flex; align-items: center; gap: 8px; font-size: 13px; opacity: 0.95; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #4CAF50; box-shadow: 0 0 8px rgba(76,175,80,0.8); }
        .close-btn { background: none; border: none; color: white; font-size: 24px; cursor: pointer; padding: 0; line-height: 1; }
        .close-btn:hover { opacity: 0.8; }

        /* Сообщения */
        .messages { flex: 1; overflow-y: auto; padding: 20px; background: #f5f5f5; }
        .message { margin-bottom: 15px; display: flex; flex-direction: column; }
        .message.user { align-items: flex-end; }
        .message.bot { align-items: flex-start; }
        .message-content { max-width: 80%; padding: 12px 16px; border-radius: 16px; font-size: 14px; line-height: 1.5; word-wrap: break-word; }
        .message.user .message-content { background: #1976D2; color: white; border-bottom-right-radius: 4px; }
        .message.bot .message-content { background: white; color: #333; border-bottom-left-radius: 4px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .message-time { font-size: 11px; color: #999; margin-top: 5px; padding: 0 5px; }

        /* Индикатор набора */
        .typing-indicator { display: none; padding: 15px 20px; background: #f5f5f5; }
        .typing-indicator.active { display: flex; gap: 5px; align-items: center; }
        .typing-indicator span { width: 8px; height: 8px; border-radius: 50%; background: #1976D2; animation: bounce 1.4s infinite ease-in-out; }
        .typing-indicator span:nth-child(1) { animation-delay: 0s; }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0.6); opacity: 0.5; } 40% { transform: scale(1); opacity: 1; } }

        /* Область ввода */
        .input-area { padding: 15px 20px; background: white; border-top: 1px solid #e0e0e0; display: flex; gap: 10px; align-items: flex-end; }
        .input-area textarea { flex: 1; padding: 12px 15px; border: 1px solid #e0e0e0; border-radius: 20px; font-size: 14px; font-family: inherit; resize: none; max-height: 100px; outline: none; transition: border-color 0.2s; }
        .input-area textarea:focus { border-color: #1976D2; }
        .input-area button { width: 44px; height: 44px; background: #1976D2; border: none; border-radius: 50%; color: white; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: transform 0.2s, background 0.2s; flex-shrink: 0; }
        .input-area button:hover:not(:disabled) { transform: scale(1.05); background: #1565C0; }
        .input-area button:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Скроллбар */
        .messages::-webkit-scrollbar { width: 6px; }
        .messages::-webkit-scrollbar-track { background: transparent; }
        .messages::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }

        /* Футер */
        .footer-links {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2;
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
        }
        .footer-link {
            font-size: 14px;
            color: #ffffff;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.8);
            font-weight: 500;
            text-decoration: none;
            opacity: 0.9;
            transition: opacity 0.2s;
        }
        .footer-link:hover { opacity: 1; text-decoration: underline; }
        .footer-divider {
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
        }
        .footer-donate {
            font-size: 14px;
            color: #ff6b6b;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.8);
            font-weight: 600;
            cursor: default;
            pointer-events: none;
        }

        @media (max-width: 480px) {
            .chat-widget { width: 100%; height: 100%; bottom: 0; right: 0; border-radius: 0; }
            .chat-launcher { bottom: 80px; right: 20px; }
            .footer-link { font-size: 12px; }
            .footer-links { bottom: 12px; gap: 8px; padding: 0 10px; }
            .footer-donate { font-size: 12px; }
            .footer-divider { font-size: 12px; }
        }
    </style>
</head>
<body>

    <!-- Глобальный экран загрузки -->
    <div class="global-overlay" id="globalOverlay">
        <div class="global-content">
            <div class="global-spinner"></div>
            <p id="globalStatus">Подключение к серверу...</p>
        </div>
    </div>

    <!-- Кнопка открытия чата -->
    <button class="chat-launcher" id="launcherBtn" title="Открыть чат">💬</button>

    <!-- Виджет чата -->
    <div class="chat-widget" id="chatWidget">
        <div class="chat-header">
            <div>
                <div class="title">Feon Chat</div>
                <div class="status"><span class="status-dot"></span> Онлайн</div>
            </div>
            <button class="close-btn" id="closeBtn">×</button>
        </div>
        
        <div class="messages" id="messages">
            <div class="message bot">
                <div class="message-content">Здравствуйте! Чем могу помочь?</div>
                <div class="message-time">Сейчас</div>
            </div>
        </div>
        
        <div class="typing-indicator" id="typingIndicator">
            <span></span><span></span><span></span>
        </div>
        
        <div class="input-area">
            <textarea id="messageInput" placeholder="Введите сообщение..." rows="1"></textarea>
            <button id="sendButton" title="Отправить">➤</button>
        </div>
    </div>

    <!-- Футер с ссылками -->
    <div class="footer-links">
        <span class="footer-donate">❤️ Donate</span>
        <span class="footer-divider">|</span>
        <a href="https://yoomoney.ru/to/4100119548371455" target="_blank" class="footer-link">💳 ЮMoney: 4100119548371455</a>
        <span class="footer-divider">|</span>
        <a href="mailto:feon.5upport@ya.ru" class="footer-link">📧 support:feon.5upport@ya.ru</a>
        <span class="footer-divider">|</span>
        <a href="https://vk.ru/feon_community" target="_blank" class="footer-link">💬 Группа ВКонтакте</a>
    </div>

    <script>
    (function() {
        const globalOverlay = document.getElementById('globalOverlay');
        const globalStatus = document.getElementById('globalStatus');
        const launcherBtn = document.getElementById('launcherBtn');
        const chatWidget = document.getElementById('chatWidget');
        const closeBtn = document.getElementById('closeBtn');
        const messages = document.getElementById('messages');
        const messageInput = document.getElementById('messageInput');
        const sendButton = document.getElementById('sendButton');
        const typingIndicator = document.getElementById('typingIndicator');

        let isConnected = false;
        const userId = 'user_' + Math.random().toString(36).substr(2, 9);

        // Проверка соединения с вашим бэкэндом
        function pingServer(callback) {
            fetch('/query', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ text: 'ping', user_id: userId })
            })
            .then(response => {
                if (response.ok) {
                    callback(true);
                } else {
                    callback(false);
                }
            })
            .catch(() => callback(false));
        }

        // Попытка подключения
        function attemptConnection() {
            globalStatus.textContent = 'Подключение к серверу...';
            globalStatus.className = '';
            
            pingServer((success) => {
                if (success) {
                    isConnected = true;
                    globalStatus.textContent = 'Соединение установлено';
                    globalStatus.className = 'success';
                    
                    setTimeout(() => {
                        globalOverlay.classList.add('hidden');
                        launcherBtn.classList.add('visible');
                    }, 800);
                } else {
                    globalStatus.textContent = 'Ошибка соединения. Повторная попытка...';
                    globalStatus.className = 'error';
                    setTimeout(attemptConnection, 3000);
                }
            });
        }

        // Запуск проверки при загрузке
        attemptConnection();

        // Открытие/закрытие чата
        launcherBtn.addEventListener('click', () => {
            chatWidget.classList.add('open');
            launcherBtn.style.display = 'none';
            messageInput.focus();
        });

        closeBtn.addEventListener('click', () => {
            chatWidget.classList.remove('open');
            launcherBtn.style.display = 'flex';
        });

        // Добавление сообщения в интерфейс
        function addMessage(text, sender, time) {
            const div = document.createElement('div');
            div.className = 'message ' + sender;
            const content = document.createElement('div');
            content.className = 'message-content';
            content.innerHTML = text.replace(/\n/g, '<br>');
            const timeSpan = document.createElement('div');
            timeSpan.className = 'message-time';
            timeSpan.textContent = time;
            div.appendChild(content);
            div.appendChild(timeSpan);
            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
        }

        // Отправка сообщения на бэкэнд
        async function sendMessage() {
            const text = messageInput.value.trim();
            if (!text || !isConnected) return;

            addMessage(text, 'user', new Date().toLocaleTimeString([], {hour: '2-digit', minute: '2-digit'}));
            messageInput.value = '';
            messageInput.style.height = 'auto';
            sendButton.disabled = true;
            typingIndicator.classList.add('active');

            try {
                const response = await fetch('/query', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: text, user_id: userId })
                });
                
                const data = await response.json();
                typingIndicator.classList.remove('active');
                
                if (data.answer) {
                    addMessage(data.answer, 'bot', new Date().toLocaleTimeString([], {hour: '2-digit', minute: '2-digit'}));
                } else {
                    addMessage(data.error || 'Произошла ошибка при обработке запроса.', 'bot', new Date().toLocaleTimeString([], {hour: '2-digit', minute: '2-digit'}));
                }
            } catch (err) {
                typingIndicator.classList.remove('active');
                addMessage('Ошибка соединения с сервером. Попробуйте позже.', 'bot', new Date().toLocaleTimeString([], {hour: '2-digit', minute: '2-digit'}));
                console.error('Chat error:', err);
            } finally {
                sendButton.disabled = false;
                messageInput.focus();
            }
        }

        sendButton.addEventListener('click', sendMessage);
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
        });
        messageInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 100) + 'px';
        });

        // Периодический пинг (каждые 30 сек) для проверки статуса
        setInterval(() => {
            if (isConnected) {
                pingServer((success) => {
                    if (!success) {
                        isConnected = false;
                        globalStatus.textContent = 'Соединение потеряно. Переподключение...';
                        globalStatus.className = 'error';
                        globalOverlay.classList.remove('hidden');
                        launcherBtn.classList.remove('visible');
                        chatWidget.classList.remove('open');
                        setTimeout(attemptConnection, 2000);
                    }
                });
            }
        }, 30000);

        // Обработчики состояния сети браузера
        window.addEventListener('offline', () => {
            if (isConnected) {
                isConnected = false;
                globalStatus.textContent = 'Нет интернета';
                globalStatus.className = 'error';
                globalOverlay.classList.remove('hidden');
                launcherBtn.classList.remove('visible');
            }
        });
        window.addEventListener('online', () => {
            if (!isConnected) {
                globalStatus.textContent = 'Восстановление сети...';
                globalStatus.className = '';
                attemptConnection();
            }
        });
    })();
    </script>
</body>
</html>
